<!doctype html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <link rel="icon" href="<?!= include('BrandIconDataUri'); ?>">
    <style>
      :root {
        --ink: #17201f;
        --muted: #66716f;
        --line: #dfe7e4;
        --surface: #ffffff;
        --soft: #f6f4ec;
        --green: #154846;
        --teal: #238b83;
        --blue: #006bd6;
        --orange: #ff7a00;
        --amber: #ffb85c;
        --coral: #e76f51;
        --red: #b42318;
        --shadow: 0 16px 50px rgba(23, 32, 31, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background: #f3f1e8;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .app {
        max-width: 1220px;
        margin: 0 auto;
        padding: 22px;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
        margin-bottom: 18px;
      }

      .brand {
        display: flex;
        gap: 12px;
        align-items: center;
        min-width: 0;
      }

      .brand-copy {
        min-width: 0;
      }

      .logo {
        width: 58px;
        height: 58px;
        border-radius: 0;
        background: transparent;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
      }

      .brand-icon-art {
        width: 58px;
        height: 58px;
        display: block;
        object-fit: contain;
        filter: drop-shadow(0 10px 18px rgba(23, 32, 31, 0.2));
      }

      h1 {
        margin: 0;
        font-size: 26px;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .brand-wordmark {
        display: flex;
        align-items: baseline;
        font-size: 29px;
        font-weight: 900;
        line-height: 0.95;
      }

      .brand-wordmark .tracker {
        color: var(--blue);
      }

      .brand-wordmark .pal {
        color: var(--orange);
      }

      .meta {
        color: var(--muted);
        font-size: 13px;
        margin-top: 6px;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .btn {
        min-height: 40px;
        padding: 0 14px;
        border-radius: 8px;
        background: var(--surface);
        color: var(--ink);
        border: 1px solid var(--line);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
      }

      .btn:hover {
        border-color: #b8c9c5;
      }

      .btn.primary {
        color: #fff;
        background: var(--green);
        border-color: var(--green);
      }

      .btn.warn {
        color: var(--ink);
        background: var(--amber);
        border-color: var(--amber);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(6, minmax(120px, 1fr));
        gap: 10px;
        margin-bottom: 14px;
      }

      .stat {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
      }

      .stat strong {
        display: block;
        font-size: 24px;
        line-height: 1;
        margin-bottom: 6px;
      }

      .stat span {
        color: var(--muted);
        font-size: 12px;
      }

      .workspace {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) auto;
        gap: 12px;
        align-items: center;
        padding: 14px;
        border-bottom: 1px solid var(--line);
      }

      .search {
        min-height: 40px;
        width: 100%;
        border-radius: 8px;
        border: 1px solid var(--line);
        padding: 0 12px;
        background: #fbfcfb;
      }

      .filters {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .chip {
        min-height: 34px;
        padding: 0 10px;
        border-radius: 999px;
        background: #f7f9f8;
        border: 1px solid var(--line);
        color: var(--muted);
      }

      .chip.active {
        background: #e2f2ef;
        color: var(--green);
        border-color: #a4d5cd;
      }

      .orders {
        max-height: calc(100vh - 270px);
        overflow: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 920px;
      }

      th,
      td {
        padding: 12px 14px;
        text-align: left;
        border-bottom: 1px solid var(--line);
        vertical-align: middle;
      }

      th {
        position: sticky;
        top: 0;
        z-index: 1;
        background: #fbfcfb;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      tr:hover td {
        background: #fafbf8;
      }

      .item-title {
        font-weight: 700;
        max-width: 320px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .item-sub {
        color: var(--muted);
        font-size: 12px;
        margin-top: 3px;
        max-width: 320px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .status {
        min-width: 150px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        min-height: 36px;
        padding: 0 8px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        padding: 0 9px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }

      .pill.overdue,
      .pill.exception {
        background: #fce8e6;
        color: var(--red);
      }

      .pill.today {
        background: #fff4ce;
        color: #775400;
      }

      .pill.delivered {
        background: #e6f4ea;
        color: #137333;
      }

      .pill.missing {
        background: #eef2f1;
        color: #4f5b58;
      }

      .empty,
      .loading {
        padding: 52px 20px;
        text-align: center;
        color: var(--muted);
      }

      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        padding: 12px 14px;
        border-radius: 8px;
        background: var(--green);
        color: #fff;
        box-shadow: var(--shadow);
        opacity: 0;
        transform: translateY(8px);
        transition: 160ms ease;
        pointer-events: none;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(23, 32, 31, 0.38);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px;
      }

      .modal-backdrop.open {
        display: flex;
      }

      .modal {
        width: min(680px, 100%);
        background: #fff;
        border-radius: 8px;
        box-shadow: var(--shadow);
        border: 1px solid var(--line);
      }

      .modal header,
      .modal footer {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .modal footer {
        border-top: 1px solid var(--line);
        border-bottom: 0;
        justify-content: flex-end;
      }

      .modal h2 {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0;
      }

      .form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        padding: 16px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      label {
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
      }

      .field input,
      .field select,
      .field textarea {
        min-height: 40px;
        border-radius: 8px;
        border: 1px solid var(--line);
        padding: 8px 10px;
        width: 100%;
      }

      textarea {
        resize: vertical;
        min-height: 72px;
      }

      .received {
        width: 20px;
        height: 20px;
      }

      @media (max-width: 860px) {
        .app {
          padding: 12px;
        }

        .topbar,
        .toolbar {
          grid-template-columns: 1fr;
        }

        .actions,
        .filters {
          justify-content: flex-start;
        }

        .stats {
          grid-template-columns: repeat(2, 1fr);
        }

        .orders {
          max-height: none;
        }

        .form {
          grid-template-columns: 1fr;
        }

        .brand-wordmark {
          font-size: 27px;
        }

        .logo,
        .brand-icon-art {
          width: 54px;
          height: 54px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="topbar">
        <div class="brand">
          <div class="logo" aria-hidden="true">
            <?!= include('BrandIcon'); ?>
          </div>
          <div class="brand-copy">
            <h1 class="brand-wordmark" aria-label="TrackerPal"><span class="tracker">Tracker</span><span class="pal">Pal</span></h1>
            <div class="meta" id="meta">v<?= version ?></div>
          </div>
        </div>
        <div class="actions">
          <button class="btn" id="sheetBtn" type="button">Open Sheet</button>
          <button class="btn" id="refreshBtn" type="button">Refresh</button>
          <button class="btn" id="syncBtn" type="button">Sync Gmail</button>
          <button class="btn warn" id="backfillBtn" type="button">Backfill</button>
          <button class="btn primary" id="addBtn" type="button">Add Order</button>
        </div>
      </section>

      <section class="stats" id="stats"></section>

      <section class="workspace">
        <div class="toolbar">
          <input class="search" id="search" type="search" placeholder="Search orders, stores, tracking">
          <div class="filters" id="filters"></div>
        </div>
        <div class="orders" id="orders">
          <div class="loading">Loading TrackerPal...</div>
        </div>
      </section>
    </main>

    <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <form class="modal" id="manualForm">
        <header>
          <h2 id="modalTitle">Add Order</h2>
          <button class="btn" type="button" id="closeModalBtn">Close</button>
        </header>
        <div class="form">
          <div class="field">
            <label for="status">Status</label>
            <select id="status" name="status">
              <option>Ordered</option>
              <option>Shipped</option>
              <option>Out for delivery</option>
              <option>Delivered</option>
              <option>Exception</option>
            </select>
          </div>
          <div class="field">
            <label for="store">Store</label>
            <input id="store" name="store" autocomplete="organization">
          </div>
          <div class="field full">
            <label for="item">Item</label>
            <input id="item" name="item">
          </div>
          <div class="field">
            <label for="orderNumber">Order Number</label>
            <input id="orderNumber" name="orderNumber">
          </div>
          <div class="field">
            <label for="carrier">Carrier</label>
            <input id="carrier" name="carrier" list="carriers">
            <datalist id="carriers">
              <option value="Amazon Logistics"></option>
              <option value="UPS"></option>
              <option value="FedEx"></option>
              <option value="USPS"></option>
              <option value="DHL"></option>
              <option value="OnTrac"></option>
              <option value="Veho"></option>
              <option value="Pitney Bowes"></option>
              <option value="GLS"></option>
            </datalist>
          </div>
          <div class="field">
            <label for="trackingNumber">Tracking Number</label>
            <input id="trackingNumber" name="trackingNumber">
          </div>
          <div class="field">
            <label for="estimatedArrival">Estimated Arrival</label>
            <input id="estimatedArrival" name="estimatedArrival" placeholder="YYYY-MM-DD">
          </div>
          <div class="field full">
            <label for="trackingUrl">Tracking URL</label>
            <input id="trackingUrl" name="trackingUrl" type="url">
          </div>
          <div class="field full">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes"></textarea>
          </div>
        </div>
        <footer>
          <button class="btn" type="button" id="cancelBtn">Cancel</button>
          <button class="btn primary" type="submit">Save Order</button>
        </footer>
      </form>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const statusOptions = ["Ordered", "Shipped", "Out for delivery", "Delivered", "Exception"];
      const filters = [
        ["open", "Open"],
        ["today", "Due Today"],
        ["overdue", "Overdue"],
        ["exception", "Exceptions"],
        ["delivered", "Delivered"],
        ["missing", "Missing ETA"],
        ["all", "All"]
      ];
      let state = null;
      let activeFilter = "open";
      let searchTerm = "";

      const $ = (id) => document.getElementById(id);

      document.addEventListener("DOMContentLoaded", () => {
        $("refreshBtn").addEventListener("click", loadState);
        $("syncBtn").addEventListener("click", () => runAction("syncTrackerPalNow", "Synced Gmail"));
        $("backfillBtn").addEventListener("click", () => runAction("backfillTrackerPalNow", "Backfill complete"));
        $("addBtn").addEventListener("click", openModal);
        $("closeModalBtn").addEventListener("click", closeModal);
        $("cancelBtn").addEventListener("click", closeModal);
        $("sheetBtn").addEventListener("click", () => state && state.sheetUrl && window.open(state.sheetUrl, "_blank", "noopener"));
        $("search").addEventListener("input", (event) => {
          searchTerm = event.target.value.toLowerCase();
          renderOrders();
        });
        $("manualForm").addEventListener("submit", saveManualOrder);
        renderFilters();
        loadState();
      });

      function loadState() {
        setBusy(true);
        google.script.run
          .withSuccessHandler((nextState) => {
            state = nextState;
            setBusy(false);
            render();
          })
          .withFailureHandler(showError)
          .getTrackerPalState();
      }

      function runAction(functionName, label) {
        setBusy(true);
        google.script.run
          .withSuccessHandler((nextState) => {
            state = nextState;
            setBusy(false);
            render();
            toast(nextState.message || label);
          })
          .withFailureHandler(showError)
          [functionName]();
      }

      function saveManualOrder(event) {
        event.preventDefault();
        const form = new FormData(event.currentTarget);
        const entry = Object.fromEntries(form.entries());
        setBusy(true);
        google.script.run
          .withSuccessHandler((result) => {
            state = result.state;
            setBusy(false);
            closeModal();
            render();
            toast(`Manual order ${result.action}.`);
          })
          .withFailureHandler(showError)
          .addTrackerPalManualOrder(entry);
      }

      function setReceived(rowIndex, received) {
        setBusy(true);
        google.script.run
          .withSuccessHandler((nextState) => {
            state = nextState;
            setBusy(false);
            render();
          })
          .withFailureHandler(showError)
          .setTrackerPalReceived(rowIndex, received);
      }

      function updateStatus(rowIndex, status) {
        setBusy(true);
        google.script.run
          .withSuccessHandler((nextState) => {
            state = nextState;
            setBusy(false);
            render();
          })
          .withFailureHandler(showError)
          .updateTrackerPalStatus(rowIndex, status);
      }

      function render() {
        $("meta").textContent = `v${state.version} - ${state.generatedAt}`;
        renderStats();
        renderFilters();
        renderOrders();
      }

      function renderStats() {
        const items = [
          ["Open", state.stats.open],
          ["Overdue", state.stats.overdue],
          ["Due Today", state.stats.dueToday],
          ["Exceptions", state.stats.exceptions],
          ["Delivered", state.stats.delivered],
          ["Received", state.stats.received]
        ];
        $("stats").innerHTML = items.map(([label, value]) => `
          <div class="stat">
            <strong>${escapeHtml(value)}</strong>
            <span>${escapeHtml(label)}</span>
          </div>
        `).join("");
      }

      function renderFilters() {
        $("filters").innerHTML = filters.map(([key, label]) => `
          <button class="chip ${activeFilter === key ? "active" : ""}" type="button" data-filter="${key}">
            ${escapeHtml(label)}
          </button>
        `).join("");
        document.querySelectorAll("[data-filter]").forEach((button) => {
          button.addEventListener("click", () => {
            activeFilter = button.dataset.filter;
            renderFilters();
            renderOrders();
          });
        });
      }

      function renderOrders() {
        if (!state) {
          $("orders").innerHTML = '<div class="loading">Loading TrackerPal...</div>';
          return;
        }

        const orders = state.orders.filter(matchesFilter).filter(matchesSearch).sort(sortOrders);
        if (!orders.length) {
          $("orders").innerHTML = '<div class="empty">No matching orders.</div>';
          return;
        }

        $("orders").innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Received</th>
                <th>Item</th>
                <th>Status</th>
                <th>ETA</th>
                <th>Tracking</th>
                <th>Signal</th>
              </tr>
            </thead>
            <tbody>
              ${orders.map(renderOrderRow).join("")}
            </tbody>
          </table>
        `;

        document.querySelectorAll("[data-received-row]").forEach((input) => {
          input.addEventListener("change", () => setReceived(Number(input.dataset.receivedRow), input.checked));
        });
        document.querySelectorAll("[data-status-row]").forEach((select) => {
          select.addEventListener("change", () => updateStatus(Number(select.dataset.statusRow), select.value));
        });
      }

      function renderOrderRow(order) {
        const signal = getSignal(order);
        const trackingText = [order.carrier, order.trackingNumber].filter(Boolean).join(" ");
        return `
          <tr>
            <td><input class="received" type="checkbox" ${order.received ? "checked" : ""} data-received-row="${order.rowIndex}"></td>
            <td>
              <div class="item-title">${escapeHtml(order.item || order.store || "Untitled order")}</div>
              <div class="item-sub">${escapeHtml([order.store, order.orderNumber].filter(Boolean).join(" - "))}</div>
            </td>
            <td>
              <select class="status" data-status-row="${order.rowIndex}">
                ${statusOptions.map((status) => `<option ${status === order.status ? "selected" : ""}>${escapeHtml(status)}</option>`).join("")}
              </select>
            </td>
            <td>${escapeHtml(order.estimatedArrival || "")}</td>
            <td>
              ${order.trackingUrl ? `<a href="${escapeAttr(order.trackingUrl)}" target="_blank" rel="noopener">${escapeHtml(trackingText || "Track")}</a>` : escapeHtml(trackingText)}
              <div class="item-sub">${escapeHtml(order.notes || "")}</div>
            </td>
            <td><span class="pill ${signal.key}">${escapeHtml(signal.label)}</span></td>
          </tr>
        `;
      }

      function matchesFilter(order) {
        const signal = getSignal(order).key;
        if (activeFilter === "all") return true;
        if (activeFilter === "open") return !order.received;
        if (activeFilter === "today") return signal === "today";
        if (activeFilter === "overdue") return signal === "overdue";
        if (activeFilter === "exception") return order.status === "Exception";
        if (activeFilter === "delivered") return !order.received && order.status === "Delivered";
        if (activeFilter === "missing") return signal === "missing";
        return true;
      }

      function matchesSearch(order) {
        if (!searchTerm) return true;
        return [
          order.store,
          order.item,
          order.orderNumber,
          order.carrier,
          order.trackingNumber,
          order.notes
        ].join(" ").toLowerCase().includes(searchTerm);
      }

      function sortOrders(a, b) {
        const aSignal = getSignal(a).rank;
        const bSignal = getSignal(b).rank;
        if (aSignal !== bSignal) return aSignal - bSignal;
        return (a.estimatedArrival || "9999-12-31").localeCompare(b.estimatedArrival || "9999-12-31");
      }

      function getSignal(order) {
        const today = state && state.today ? state.today : new Date().toISOString().slice(0, 10);
        if (order.received) return { key: "delivered", label: "Received", rank: 8 };
        if (order.status === "Exception") return { key: "exception", label: "Exception", rank: 0 };
        if (order.status === "Delivered") return { key: "delivered", label: "Delivered", rank: 3 };
        if (order.estimatedArrival && order.estimatedArrival < today) return { key: "overdue", label: "Overdue", rank: 1 };
        if (order.estimatedArrival === today) return { key: "today", label: "Due Today", rank: 2 };
        if (!order.estimatedArrival) return { key: "missing", label: "Missing ETA", rank: 6 };
        return { key: "", label: "Expected", rank: 5 };
      }

      function openModal() {
        $("manualForm").reset();
        $("modalBackdrop").classList.add("open");
        $("store").focus();
      }

      function closeModal() {
        $("modalBackdrop").classList.remove("open");
      }

      function setBusy(isBusy) {
        document.body.style.cursor = isBusy ? "progress" : "";
        document.querySelectorAll("button, input, select, textarea").forEach((node) => {
          if (node.id !== "search") node.disabled = Boolean(isBusy);
        });
      }

      function showError(error) {
        setBusy(false);
        toast(error && error.message ? error.message : String(error), true);
      }

      function toast(message, isError) {
        const node = $("toast");
        node.textContent = message;
        node.style.background = isError ? "var(--red)" : "var(--green)";
        node.classList.add("show");
        setTimeout(() => node.classList.remove("show"), 3600);
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[char]));
      }

      function escapeAttr(value) {
        return escapeHtml(value).replace(/`/g, "&#96;");
      }
    </script>
  </body>
</html>
